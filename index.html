<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up-form</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="image">
        <img src="./imgs/halie-west-unsplash.jpg" alt="background">
        <div class="icon">
            <img src="./imgs/odin-lined.png" alt="icon">
            <p class="icon-desc">ODIN</p>
        </div>
    </div>
    <div class="content">
        <div class="header">
            <p>This is not a real online service!Stuck with mediocre websites? Why dont you build your own? Hope on in with us.Lets begin this exciting journey! Sign up to get started.</p>
            <p>You know you want to.</p>
        </div>
        <form >

            <div class="container">
            
            <div class="input">
                <h2>Let's do this!</h2>
                <div class="names">
                    <div class="user_inputs">
                        <label for="f_name">FIRST NAME</label>
                        <input type="text" id="f_name" name="user_first_name">
                    </div>

                    <div class="user_inputs">
                        <label for="l_name">LAST NAME</label>
                        <input type="text" name="user_last_name" id="l_name">
                    </div>
                </div>

                <div class="contacts">
                    <div class="user_inputs">
                        <label for="email">EMAIL</label>
                        <input type="email" name="user_mail" id="email">
                    </div>

                    <div class="user_inputs">
                        <label for="phone">PHONE NUMBER</label>
                        <input type="tel" name="user_phone" id="phone">
                    </div>
                </div>

                <div class="passwords">
                    <div class="user_inputs">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" name="user_password">
                    </div>

                    <div class="user_inputs">
                        <label for="confirm">CONFIRM PASSWORD</label>
                        <input type="password" name="user_confirm" id="confirm">
                    </div>
                </div>

            </div>
            <div class="button">
                <button type="submit">Create Account</button>
                <p>Already have an account?<span> Log in</span></p>
            </div>

            </div>
        </form>
    </div>
</body>
</html>
